name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify-github

  # Job 2: build and run unit tests
  test:
    runs-on: macos-15
    permissions:
      checks: write
      pull-requests: write
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: SPM cache status
        run: |
          echo "Cache hit: ${{ steps.spm-cache.outputs.cache-hit }}"
          ls SourcePackages/checkouts/ 2>/dev/null || echo "(empty — will be fetched)"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Upload xcodebuild log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Publish test report
        if: failure()
        run: |
          python3 - <<'EOF'
          import json, subprocess, os, sys

          XCRESULT = 'TestResults.xcresult'

          def xcresulttool(*args):
              r = subprocess.run(
                  ['xcrun', 'xcresulttool'] + list(args) + ['--path', XCRESULT],
                  capture_output=True, text=True)
              if r.returncode != 0:
                  return None, r.stderr.strip()
              try:
                  return json.loads(r.stdout), None
              except Exception as e:
                  return None, f"JSON parse error: {e}"

          # --- Step 1: get test list (new API, Xcode 16+) ---
          tests, err = xcresulttool('get', 'test-results', 'tests')
          if not tests:
              print(f"xcresulttool new API failed: {err}")
              sys.exit(0)

          # --- Step 2: walk tree and collect failed test nodeIdentifiers ---
          def collect_failed(nodes):
              results = []
              for node in (nodes or []):
                  result = (node.get('result') or '').lower()
                  ntype  = (node.get('nodeType') or '').lower()
                  if result in ('failed', 'failure') and 'test' in ntype and 'class' not in ntype and 'bundle' not in ntype and 'plan' not in ntype:
                      results.append({
                          'id':   node.get('nodeIdentifier', ''),
                          'name': node.get('name', '?'),
                      })
                  results.extend(collect_failed(node.get('children', [])))
              return results

          failed = collect_failed(tests.get('testNodes', []))
          if not failed:
              print("No failed test cases found in test tree")
              print("Top-level keys:", list(tests.keys()))
              if tests.get('testNodes'):
                  print("First node sample:", json.dumps(tests['testNodes'][0])[:400])
              sys.exit(0)

          # --- Step 3: get details for each failure ---
          summary_path = os.environ.get('GITHUB_STEP_SUMMARY', '')
          md = ['## Test Failures\n\n| Test | Location | Message |\n|------|----------|---------|\n']

          for f in failed:
              details, err2 = xcresulttool('get', 'test-results', 'test-details', '--test-id', f['id'])

              if not details:
                  msg, file_, line = f"(details unavailable: {err2})", '', ''
              else:
                  # Extract failure message — try common field names
                  issues = details.get('issues') or []
                  if issues:
                      first = issues[0]
                      msg   = first.get('message') or first.get('description') or '(no message)'
                      file_ = first.get('sourceURL', '').split('/RecipeBox/')[-1].split('?')[0]
                      line  = str(first.get('lineNumber') or '')
                  else:
                      msg   = details.get('message') or details.get('failureMessage') or '(no message)'
                      file_ = ''
                      line  = ''
                      # Debug: show structure if we haven't extracted anything useful
                      if msg == '(no message)':
                          print(f"details keys for {f['name']}: {list(details.keys())}")
                          print(f"details[:400]: {json.dumps(details)[:400]}")

              loc = f"{file_}:{line}" if file_ and line else file_ or '—'
              if file_ and line:
                  print(f"::error file={file_},line={line}::{f['name']}: {msg}")
              else:
                  print(f"::error::{f['name']}: {msg}")
              md.append(f"| `{f['name']}` | `{loc}` | {msg} |\n")

          if summary_path:
              open(summary_path, 'a').write(''.join(md))
          EOF

      - name: Save SPM cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
