name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify-github

  # Job 2: build and run unit tests
  test:
    runs-on: macos-15
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: SPM cache status
        run: |
          echo "Cache hit: ${{ steps.spm-cache.outputs.cache-hit }}"
          ls SourcePackages/checkouts/ 2>/dev/null || echo "(empty — will be fetched)"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Show failure details
        if: failure()
        run: |
          echo "=== xcodebuild.log line count ==="
          wc -l xcodebuild.log || echo "file not found"
          echo "=== lines containing 'mapsDetail' ==="
          grep -n "mapsDetail" xcodebuild.log | head -20 || echo "(none)"
          echo "=== last 50 lines of raw log ==="
          tail -50 xcodebuild.log || echo "(empty)"

      - name: Save SPM cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
