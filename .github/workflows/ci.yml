name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify

  # Job 2: build and run unit tests, upload results regardless of outcome
  test:
    runs-on: macos-15
    permissions:
      checks: write
      pull-requests: write
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Cache SPM packages
        id: spm-cache
        uses: actions/cache@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-
          save-always: true

      - name: SPM cache status
        run: |
          echo "Cache hit: ${{ steps.spm-cache.outputs.cache-hit }}"
          echo "Packages in SourcePackages:"
          ls SourcePackages/checkouts/ 2>/dev/null || echo "(empty — will be fetched)"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO | xcbeautify --renderer github-actions --report-path . --report junit

      - name: Debug report files
        if: always()
        run: ls -la *.junit *.xml 2>/dev/null || echo "No report files found"

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Unit Tests
          path: report.junit
          reporter: java-junit
          fail-on-error: false

