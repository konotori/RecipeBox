name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify-github

  # Job 2: build and run unit tests
  test:
    runs-on: macos-15
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: SPM cache status
        run: |
          echo "Cache hit: ${{ steps.spm-cache.outputs.cache-hit }}"
          ls SourcePackages/checkouts/ 2>/dev/null || echo "(empty — will be fetched)"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Show failure details
        if: failure()
        run: |
          python3 - <<'EOF'
          import os, sys

          try:
              lines = open("xcodebuild.log").readlines()
          except FileNotFoundError:
              print("xcodebuild.log not found")
              sys.exit(0)

          # Print 5 raw lines before and after each failing test line
          failure_indices = [i for i, l in enumerate(lines)
                             if "recorded an issue" in l or "#expect" in l
                             or "Expectation failed" in l or "Issue recorded" in l
                             or ("✗" in l and "failed" in l.lower())]

          summary = os.environ.get("GITHUB_STEP_SUMMARY", "")
          out_lines = ["## Test Failure Details\n\n```\n"]
          seen = set()
          for idx in failure_indices:
              for i in range(max(0, idx - 2), min(len(lines), idx + 3)):
                  if i not in seen:
                      out_lines.append(lines[i])
                      seen.add(i)
              out_lines.append("---\n")

          if len(out_lines) == 1:
              out_lines.append("(no structured failure details found — check raw log above)\n")
          out_lines.append("```\n")

          content = "".join(out_lines)
          print(content)
          if summary:
              open(summary, "a").write(content)
          EOF

      - name: Save SPM cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
