name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify-github

  # Job 2: build and run unit tests
  test:
    runs-on: macos-15
    permissions:
      checks: write
      pull-requests: write
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: SPM cache status
        run: |
          echo "Cache hit: ${{ steps.spm-cache.outputs.cache-hit }}"
          ls SourcePackages/checkouts/ 2>/dev/null || echo "(empty — will be fetched)"

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Upload xcodebuild log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Publish test report
        if: failure()
        run: |
          python3 - <<'EOF'
          import json, subprocess, os, sys

          def xcresult_get(*args):
              r = subprocess.run(
                  ['xcrun', 'xcresulttool', 'get', '--legacy', '--format', 'json',
                   '--path', 'TestResults.xcresult'] + list(args),
                  capture_output=True, text=True)
              return (json.loads(r.stdout), None) if r.returncode == 0 else (None, r.stderr)

          # Load top-level record
          data, err = xcresult_get()
          if not data:
              print("xcresulttool failed:", err); sys.exit(0)

          # Dump 500 chars to see structure
          print("TOP-LEVEL KEYS:", list(data.keys()))
          ref_id = None
          for action in data.get('actions', {}).get('_values', []):
              ref = action.get('actionResult', {}).get('testsRef', {})
              ref_id = ref.get('id', {}).get('_value')
              if ref_id: break
          print("ref_id:", ref_id)

          if not ref_id:
              print("No testsRef found"); sys.exit(0)

          test_data, err2 = xcresult_get('--id', ref_id)
          if not test_data:
              print("test_data load failed:", err2); sys.exit(0)

          # Search for 'Failure' in the whole JSON
          raw = json.dumps(test_data)
          idx = raw.find('"Failure"')
          print(f"'Failure' found at index {idx}")
          if idx >= 0:
              print("Context:", raw[max(0,idx-200):idx+300])
          else:
              print("TOP-LEVEL KEYS of test_data:", list(test_data.keys()))
              print("test_data[:800]:", raw[:800])
          EOF

      - name: Save SPM cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
