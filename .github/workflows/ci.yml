name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify

  # Job 2: build and run unit tests, upload results regardless of outcome
  test:
    runs-on: macos-15
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Test
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults.xcresult
