name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: chạy SwiftFormat + SwiftLint (không cần Xcode, nhanh hơn)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app

      - name: Cache Mint
        uses: actions/cache@v4
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify

  # Job 2: build và chạy unit tests, upload kết quả dù pass hay fail
  test:
    runs-on: macos-15
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -switch /Applications/Xcode_16.2.app

      - name: Boot iOS Simulator
        run: |
          RUNTIME=$(xcrun simctl list runtimes --json | \
            python3 -c "
import json, sys
data = json.load(sys.stdin)
rts = [r for r in data['runtimes'] if 'iOS' in r.get('name', '')]
avail = [r for r in rts if r.get('isAvailable', False)] or rts
print(avail[-1]['identifier'])
")
          echo "Using runtime: $RUNTIME"
          UDID=$(xcrun simctl create "CI-iPhone" "iPhone 16" "$RUNTIME")
          xcrun simctl boot "$UDID"
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV

      - name: Test
        run: |
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,id=$SIMULATOR_UDID" \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.run_id }}
          path: TestResults.xcresult
