name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: SwiftFormat + SwiftLint (no Xcode needed)
  lint:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Cache Mint
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: mint-${{ runner.os }}-${{ hashFiles('Mintfile') }}

      - name: Install pinned tools (Mint)
        run: |
          brew install mint
          mint bootstrap

      - name: Lint + format check
        run: make verify-github

  # Job 2: build and run unit tests
  test:
    runs-on: macos-15
    timeout-minutes: 30
    env:
      PROJECT: RecipeBox.xcodeproj
      SCHEME: RecipeBox-Dev
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Restore SPM cache
        id: spm-cache
        uses: actions/cache/restore@v5
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-

      - name: Install xcbeautify
        run: brew install xcbeautify

      - name: Test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=iPhone 16" \
            -clonedSourcePackagesDirPath SourcePackages \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO 2>&1 | tee xcodebuild.log | xcbeautify --renderer github-actions

      - name: Upload xcresult
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult

      - name: Upload xcodebuild log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log

      - name: Save SPM cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('RecipeBox.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

  # Job 3: duplicate-image gate. No Xcode needed, so it runs on a cheap Ubuntu
  # runner.
  #   - On a PR: incremental — fails only on duplicates the PR introduces (diffs
  #     against the PR base; pre-existing duplicates never block an unrelated PR).
  #   - On push to main: whole-project — fails on ANY duplicate. This catches
  #     what a per-PR diff structurally can't see — two PRs that each add the
  #     same image, or a direct push to main. Requires main to stay
  #     duplicate-free, so clean any existing duplicates once before relying on
  #     it (whole-project is robust under concurrency: each run re-scans the
  #     current tip, so a cancelled run never permanently misses anything).
  # The weekly unused scan + tool self-test live in hygiene.yml; see
  # docs/IMAGE_HYGIENE.md.
  duplicate-images:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0 # needed to diff a PR against its base

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install Pillow

      - name: Check for duplicate images
        shell: bash
        run: |
          set -o pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Incremental: gate only on duplicates this PR introduces.
            # three-dot: diff against the merge-base, so only the PR's own
            # changes count even if the base branch advanced meanwhile.
            git diff --diff-filter=AMR --name-only \
              "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" \
              > changed.txt || true
            if grep -qiE '\.(png|jpg|jpeg|webp|bmp|tiff|tif|pdf|svg|heic|gif)$' changed.txt; then
              python scripts/find_duplicate_images.py RecipeBox --root . \
                --changed-list changed.txt --fail-on-found | tee duplicates.md
            else
              echo "No image files changed; skipping duplicate scan." | tee duplicates.md
            fi
          else
            # Push to main: whole-project, fail on ANY duplicate.
            python scripts/find_duplicate_images.py RecipeBox --root . \
              --fail-on-found | tee duplicates.md
          fi

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: duplicate-images-report
          path: duplicates.md
