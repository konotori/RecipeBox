name: Hygiene

# Weekly advisory hygiene (unused images + dead Swift code) + a self-test that
# protects the image tools. Duplicate images are gated entirely in ci.yml (on
# every PR and every push to main), so they are not scanned here.
#
# Triggers:
#   - schedule / workflow_dispatch: run the weekly scans + the self-test.
#   - push / pull_request limited to the hygiene scripts: run the self-test
#     only, so changes to the tools are verified without burdening other PRs.
#
# For template adoption: `schedule` only fires on the repository's default branch.
on:
  schedule:
    - cron: '0 1 * * 1' # Mondays 01:00 UTC (~08:00 Asia/Ho_Chi_Minh)
  workflow_dispatch:
  push:
    paths:
      - 'scripts/find_duplicate_images.py'
      - 'scripts/find_unused_images.py'
      - 'scripts/test_image_hygiene.py'
      - 'scripts/image-allowlist.txt'
      - '.github/workflows/hygiene.yml'
  pull_request:
    paths:
      - 'scripts/find_duplicate_images.py'
      - 'scripts/find_unused_images.py'
      - 'scripts/test_image_hygiene.py'
      - 'scripts/image-allowlist.txt'
      - '.github/workflows/hygiene.yml'

concurrency:
  group: hygiene-${{ github.ref }}
  cancel-in-progress: true

env:
  FENGNIAO_VERSION: '0.13.0'
  PERIPHERY_VERSION: '3.7.4'

jobs:
  # Protect the tools: build fixtures for every case and assert the reports.
  # Runs on every trigger (incl. PRs that touch the scripts above).
  self-test:
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Pillow
        run: pip install Pillow
      - name: Cache Mint
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: mint-fengniao-${{ env.FENGNIAO_VERSION }}
      - name: Install FengNiao
        run: |
          brew install mint
          mint install onevcat/FengNiao@${{ env.FENGNIAO_VERSION }}
      - name: Run self-test
        run: FENGNIAO="$HOME/.mint/bin/fengniao" python scripts/test_image_hygiene.py

  # Weekly advisory scan: unused images (whole project, batch cleanup).
  unused:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Cache Mint
        uses: actions/cache@v5
        with:
          path: ~/.mint
          key: mint-fengniao-${{ env.FENGNIAO_VERSION }}
      - name: Install FengNiao
        run: |
          brew install mint
          mint install onevcat/FengNiao@${{ env.FENGNIAO_VERSION }}
      - name: Scan for unused images
        run: |
          FENGNIAO="$HOME/.mint/bin/fengniao" \
            python scripts/find_unused_images.py RecipeBox | tee unused.md
      - uses: actions/upload-artifact@v4
        with:
          name: unused-images-report
          path: unused.md

  # Weekly advisory: unused (dead) Swift code via Periphery. Builds + indexes the
  # project (macOS), inherently fuzzy (reflection/@objc), so ADVISORY only.
  # .periphery.yml suppresses common false positives; see docs/DEAD_CODE.md.
  dead-code:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: macos-15
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install Periphery (pinned release binary)
        run: |
          curl -sSL -o /tmp/periphery.zip \
            "https://github.com/peripheryapp/periphery/releases/download/${PERIPHERY_VERSION}/periphery-${PERIPHERY_VERSION}.zip"
          mkdir -p /tmp/periphery && unzip -oq /tmp/periphery.zip -d /tmp/periphery
      - name: Scan for unused code
        run: /tmp/periphery/periphery scan --config .periphery.yml --format xcode | tee dead-code.txt
      - uses: actions/upload-artifact@v4
        with:
          name: dead-code-report
          path: dead-code.txt

  # Note: there is no weekly duplicate scan. Duplicates are gated in ci.yml on
  # every PR (incrementally) AND on every push to main (whole-project), so a
  # separate weekly whole-project pass would be redundant.
