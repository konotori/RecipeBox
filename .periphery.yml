# Periphery — unused (dead) Swift code. Used by the weekly advisory `dead-code`
# job in .github/workflows/hygiene.yml. See docs/CI.md and docs/DEAD_CODE.md.
#
# After `make new-app`, update `project` and `schemes` to your renamed project.
project: RecipeBox.xcodeproj
schemes:
  - RecipeBox-Dev

# This is an app, not a library, so unused public declarations ARE dead code.
retain_public: false

# ─── False-positive suppression ──────────────────────────────────────────────
# These rules were derived by running Periphery against the patterns that
# commonly trip it up in a SwiftUI/iOS app. Each one trades a little recall for
# far fewer false alarms (the scan is advisory, so precision matters most).

# DTO properties decoded from JSON are set by the synthesized init but never
# read in code, so Periphery reports them as "assigned but never used".
retain_codable_properties: true

# `#Preview` / `PreviewProvider` blocks are tooling entry points, not dead code.
retain_swift_ui_previews: true

# @objc members are frequently invoked by the Objective-C runtime — KVO,
# target/action, NotificationCenter selectors — where the call is invisible to
# static analysis. (Trade-off: a genuinely dead @objc member won't be reported.)
retain_objc_accessible: true

# Delegate-style protocol methods whose parameter is unused in every conformance.
retain_unused_protocol_func_params: true

# Properties of these types are kept for their lifetime / side effects, not read
# (Combine subscriptions, retained observers). Extend for your project.
retain_assign_only_property_types:
  - AnyCancellable
  - Set<AnyCancellable>
  - NSObjectProtocol

# Index the test target (so app code used only by tests isn't flagged as dead)
# but don't report dead code that lives inside the tests themselves.
report_exclude:
  - "**/*Tests/**"

disable_update_check: true

# Note: what static analysis fundamentally cannot resolve — types/selectors
# built from strings at runtime (NSClassFromString, #selector by name, KVC) —
# must be marked in code with `// periphery:ignore` (or `:ignore:parameters`).
